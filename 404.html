<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not found &middot; Katafract</title>
  <meta name="description" content="This page doesn't exist at Katafract. Head back to the homepage.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preload" href="/fonts/cormorant-garamond-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/dm-sans-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/fonts.css">
  <style>
    :root {
      --bg: #050510;
      --text: #EBF0F7;
      --dim: #8C94A6;
      --cyan: #00F0FF;
      --magenta: #FF006E;
      --border: rgba(100,100,120,0.15);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    nav img { width: 28px; height: 32px; }
    nav span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      letter-spacing: .05em;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }
    .inner { max-width: 520px; text-align: center; }
    .code {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: .8rem;
      letter-spacing: .3em;
      color: var(--magenta);
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 1rem;
    }
    h1 em { color: var(--cyan); font-style: normal; }
    p { color: var(--dim); line-height: 1.7; margin-bottom: 2.5rem; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: inline-block;
      padding: .9rem 1.6rem;
      background: var(--cyan);
      color: var(--bg);
      text-decoration: none;
      font-weight: 600;
      font-size: .95rem;
      letter-spacing: .02em;
      border-radius: 4px;
      transition: transform .15s;
    }
    a.btn:hover { transform: translateY(-1px); }
    a.btn.ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    footer {
      padding: 1.5rem 2rem;
      border-top: 1px solid var(--border);
      color: var(--dim);
      font-size: .8rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" style="display:flex;align-items:center;gap:.6rem;color:inherit;text-decoration:none">
      <img src="/katafract-mark.svg" alt="">
      <span>Katafract</span>
    </a>
  </nav>
  <main>
    <div class="inner">
      <div class="code">ERROR 404</div>
      <h1>That's not <em>here</em>.</h1>
      <p>The page you followed is gone, renamed, or never existed. No tracking, no breadcrumb &mdash; just a dead end.</p>
      <div class="links">
        <a href="/" class="btn">Home</a>
        <a href="/pricing.html" class="btn ghost">Enclave plans</a>
      </div>
    </div>
  </main>
  <footer>
    &copy; Katafract LLC &middot; <a href="mailto:hello@katafract.com" style="color:var(--dim)">hello@katafract.com</a>
  </footer>
  <script defer data-domain="katafract.com" data-api="/stats/api/event" src="/stats/js/script.js"></script>
</body>
</html>
